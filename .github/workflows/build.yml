name: Build APK from Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract and Find Project
        run: |
          # فك ضغط أول ملف zip يجده
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip "$ZIP_FILE" -d extracted_files
          
          # البحث عن المجلد الذي يحتوي على package.json وحفظه بشكل صحيح
          PROJECT_DIR=$(find extracted_files -name "package.json" -exec dirname {} \;)
          echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Found project at: $PROJECT_DIR"
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Project
        run: |
          # استخدام علامات التنصيص للتعامل مع المسافات في اسم المجلد
          cd "${{ env.PROJECT_PATH }}"
          npm install
          npm run build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/*.apk"
