name: Build APK Smart Search
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Extract All Files
        run: |
          # فك ضغط أي ملف zip موجود في أي مكان
          find . -name "*.zip" -exec unzip -o {} -d . \;
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Smart Build Execution
        run: |
          # 1. البحث عن المجلد الذي يحتوي على package.json والدخول إليه
          PROJECT_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_DIR"
          echo "Working in: $(pwd)"
          
          # 2. تثبيت التبعيات وبناء الويب
          npm install
          npm run build || true # حتى لو فشل البناء سنكمل لمحاولة بناء الأندرويد
          
          # 3. التأكد من وجود مجلد dist (الذي يطلبه Capacitor) في نفس مكان package.json
          mkdir -p dist
          
          # 4. البحث عن مجلد أندرويد وتشغيل المزامنة
          npx cap sync android || true
          
          # 5. البحث عن ملف gradlew في أي مكان داخل المشروع وتشغيل بناء الـ APK
          GRADLE_DIR=$(find . -name "gradlew" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload All Found APKs
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: "**/*.apk" # سيبحث عن أي ملف apk نتج في أي مجلد ويرفعه لك
