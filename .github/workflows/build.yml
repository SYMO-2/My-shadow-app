name: Build APK from Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Project Directly
        run: |
          # فك ضغط ملف الـ Zip في المجلد الحالي مباشرة لتجنب مشاكل المسافات في الأسماء
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip -j "$ZIP_FILE" -d . || true
          # فك ضغط الملف بالكامل مع الحفاظ على الهيكل ولكن في المجلد الرئيسي
          unzip -o "$ZIP_FILE" -d .
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Project
        run: |
          # التأكد من وجود الصلاحيات وتشغيل البناء في المجلد الحالي
          npm install
          npm run build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/*.apk"
