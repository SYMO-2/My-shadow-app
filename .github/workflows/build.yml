name: Build APK from Zip
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Extract and Find Project
        run: |
          # فك ضغط أول ملف zip يجده
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip -o "$ZIP_FILE" -d extracted_content
          
          # البحث عن المجلد الذي يحتوي على package.json
          PROJECT_DIR=$(find extracted_content -name "package.json" -exec dirname {} \; | head -n 1)
          echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Found project at: $PROJECT_DIR"
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Project
        run: |
          cd "${{ env.PROJECT_PATH }}"
          npm install
          npm run build
          npx cap sync android
          
          # البحث عن مجلد android داخل مشروعنا والدخول إليه
          ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: "**/*.apk"
