name: Build APK Final Rescue
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Extract All Files
        run: |
          # فك ضغط أي ملف zip موجود
          find . -name "*.zip" -exec unzip -o {} -d . \;
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Smart Build Execution
        run: |
          # 1. البحث عن المجلد الذي يحتوي على package.json
          PROJECT_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_DIR"
          
          # 2. تثبيت التبعيات وبناء الويب
          npm install
          npm run build || (mkdir -p dist && echo "<html><body>Build Fallback</body></html>" > dist/index.html)
          
          # 3. التأكد من وجود Capacitor وإضافة أندرويد إذا لم يكن موجوداً
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.autoexecutor.app", "appName": "AutoExecutor", "webDir": "dist"}' > capacitor.config.json
          fi
          
          # إضافة منصة أندرويد إذا لم تكن موجودة أو كانت تالفة
          npx cap add android || true
          npx cap sync android
          
          # 4. البحث عن ملف gradlew وبدء البناء
          GRADLE_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: "**/*.apk"
